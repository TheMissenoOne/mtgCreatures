<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG Creatures - D&D 5e Stat Blocks</title>
    <meta name="description" content="Browse and view D&D 5e stat blocks generated from Magic: The Gathering creatures" />

    <link
      href="//fonts.googleapis.com/css?family=Noto+Sans:400,700,400italic,700italic"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="//fonts.googleapis.com/css?family=Libre+Baskerville:700"
      rel="stylesheet"
      type="text/css"
    />
    <link href="./style.css" rel="stylesheet" type="text/css" />

    <script type="module" src="src/js/stat-block.js"></script>
    <script type="module" src="src/js/creature-heading.js"></script>
    <script type="module" src="src/js/top-stats.js"></script>
    <script type="module" src="src/js/abilities-block.js"></script>
    <script type="module" src="src/js/property-line.js"></script>
    <script type="module" src="src/js/property-block.js"></script>
    <script type="module" src="src/js/tapered-rule.js"></script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      body {
        margin: 0;
        font-family: 'Noto Sans', sans-serif;
        background: #000;
      }
      
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 10px;
        text-align: center;
      }
      
      .header h1 {
        margin: 0;
        font-size: clamp(1.5em, 4vw, 2em);
      }
      
      .header p {
        margin: 5px 0 0 0;
        font-size: clamp(0.8em, 2.5vw, 0.9em);
        opacity: 0.9;
      }
      
      .container {
        display: flex;
        height: calc(100vh - 80px);
      }
      
      .sidebar {
        width: 300px;
        background: #f5f5f5;
        border-right: 1px solid #ddd;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      
      .dropdown {
        width: 100%;
      }
      
      .dropbtn {
        width: 100%;
        padding: 14px 12px;
        background: #667eea;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 1em;
        font-weight: bold;
        border-bottom: 1px solid #ddd;
        transition: background 0.2s ease;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .dropbtn:hover,
      .dropbtn:active {
        background: #764ba2;
      }
      
      .dropdown-content {
        flex: 1;
        overflow-y: auto;
        display: none;
        background: white;
      }
      
      .dropdown-content.show {
        display: block;
      }
      
      .dropdown-content input {
        width: 100%;
        padding: 12px 10px;
        border: none;
        border-bottom: 2px solid #667eea;
        box-sizing: border-box;
        font-size: 1em;
        -webkit-appearance: none;
        appearance: none;
      }

      .dropdown-content input:focus {
        outline: none;
        border-bottom-color: #764ba2;
      }
      
      .dropdown-content a {
        display: block;
        padding: 12px 15px;
        color: #333;
        text-decoration: none;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: all 0.2s ease;
        word-break: break-word;
      }
      
      .dropdown-content a:active,
      .dropdown-content a:hover {
        background: #e8e8e8;
        color: #667eea;
        padding-left: 20px;
      }
      
      .main-content {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #000;
      }
      
      #ficha {
        max-width: 100%;
      }
      
      .card_art {
        position: relative;
        background-size: cover;
        background-position: center;
      }
      
      @media (max-width: 1024px) and (min-width: 769px) {
        .sidebar {
          width: 280px;
        }
        
        .main-content {
          padding: 15px;
        }
      }
      
      @media (max-width: 768px) {
        .header {
          padding: 12px 10px;
        }
        
        .header h1 {
          font-size: 1.4em;
        }
        
        .header p {
          font-size: 0.75em;
        }
        
        .container {
          flex-direction: column;
          height: auto;
          max-height: 100vh;
        }
        
        .sidebar {
          width: 100%;
          height: auto;
          max-height: 50vh;
          border-right: none;
          border-bottom: 1px solid #ddd;
        }
        
        .dropbtn {
          padding: 16px 12px;
          font-size: 1.05em;
          min-height: 48px;
        }
        
        .dropdown-content {
          max-height: calc(50vh - 48px);
        }
        
        .dropdown-content a {
          padding: 14px 15px;
          font-size: 1em;
          min-height: 44px;
          display: flex;
          align-items: center;
        }
        
        .dropdown-content input {
          padding: 14px 12px;
          font-size: 1em;
          min-height: 44px;
        }
        
        .main-content {
          flex: 1;
          overflow-y: auto;
          padding: 12px;
          height: auto;
          max-height: 50vh;
        }
      }
      
      @media (max-width: 480px) {
        .header {
          padding: 10px 8px;
        }
        
        .header h1 {
          font-size: 1.2em;
          margin: 0;
        }
        
        .header p {
          font-size: 0.7em;
          margin: 3px 0 0 0;
        }
        
        .dropbtn {
          padding: 14px 10px;
          font-size: 1em;
          min-height: 44px;
          gap: 6px;
        }
        
        .dropdown-content a {
          padding: 12px 12px;
          font-size: 0.95em;
          min-height: 42px;
        }
        
        .dropdown-content input {
          padding: 12px 10px;
          font-size: 0.95em;
        }
        
        .main-content {
          padding: 10px;
        }
      }
      
      @media (max-height: 600px) and (orientation: landscape) {
        .header {
          padding: 8px 10px;
        }
        
        .header h1 {
          font-size: 1.2em;
          margin: 0;
        }
        
        .header p {
          display: none;
        }
        
        .container {
          height: calc(100vh - 50px);
        }
        
        .sidebar {
          width: 40vw;
          max-width: 280px;
          border-right: 1px solid #ddd;
          border-bottom: none;
        }
        
        .dropbtn {
          padding: 10px;
          min-height: 40px;
        }
        
        .dropdown-content {
          max-height: calc(100vh - 90px);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>MTG Creatures</h1>
      <p>D&D 5e Stat Blocks from Magic: The Gathering</p>
    </div>
    
    <div class="container">
      <div class="sidebar">
        <div class="dropdown">
          <button id="dropdownbtn" class="dropbtn">Select a Creature</button>
          <div id="cards" class="dropdown-content">
            <input
              type="text"
              placeholder="Search creatures..."
              id="myInput"
              onkeyup="filterFunction()"
            />
          </div>
        </div>
      </div>
      
      <div class="main-content">
        <div id="ficha"></div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
