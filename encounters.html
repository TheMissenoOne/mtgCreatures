<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gerador de Encontros Ravnica - D&D 5e</title>
    <meta name="description" content="Gerador de encontros aleatórios com tema Ravnica para D&D 5e" />
    <link href="//fonts.googleapis.com/css?family=Noto+Sans:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <!-- Custom elements for stat blocks -->
    <script type="module" src="src/js/stat-block.js"></script>
    <script type="module" src="src/js/creature-heading.js"></script>
    <script type="module" src="src/js/top-stats.js"></script>
    <script type="module" src="src/js/abilities-block.js"></script>
    <script type="module" src="src/js/property-line.js"></script>
    <script type="module" src="src/js/property-block.js"></script>
    <script type="module" src="src/js/tapered-rule.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            overflow: visible;
        }

        .statblock{
            color: black ;
        }

        .encounters-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .encounters-header h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .encounters-header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .back-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.95);
        }

        .encounters-container {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 150px);
            padding: 20px;
            gap: 20px;
        }

        .encounter-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .encounter-panel h2 {
            margin-top: 0;
            color: #667eea;
            font-size: 1.5em;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 10px;
        }

        .form-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: bold;
            color: #aaa;
            font-size: 0.95em;
        }

        .form-group select,
        .form-group input {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 4px;
            color: white;
            font-size: 1em;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
        }
        .statblock {
            margin-top: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
        }

        button {
            flex: 1;
            min-width: 160px;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 48px;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background: rgba(102, 126, 234, 0.3);
            border: 2px solid #667eea;
        }

        .encounter-result {
            background: rgba(102, 126, 234, 0.1);
            border-left: 4px solid #667eea;
            border-radius: 4px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .encounter-result.visible {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .encounter-result h3 {
            margin-top: 0;
            color: #667eea;
            font-size: 1.3em;
        }

        .environment-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 15px;
            margin: 15px 0;
            border-left: 3px solid #764ba2;
        }

        .environment-info strong {
            color: #aaa;
            display: block;
            margin-bottom: 8px;
        }

        .encounters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .encounter-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .encounter-card:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .encounter-card strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .encounter-card em {
            font-style: italic;
            color: #bbb;
            font-size: 0.95em;
        }

        .guild-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin: 4px 4px 4px 0;
        }

        .azorius { background: #cfe2ff; color: #003d82; }
        .dimir { background: #b5cce8; color: #002147; }
        .rakdos { background: #ffc1c1; color: #5a0000; }
        .golgari { background: #d4d4a8; color: #2a2a00; }
        .selesnya { background: #c8e6c9; color: #1b5e20; }
        .orzhov { background: #e8e8e8; color: #212121; }
        .izzet { background: #ffe0b2; color: #e65100; }
        .gruul { background: #c8e6c9; color: #1b5e20; }
        .boros { background: #ffccbc; color: #bf360c; }
        .simic { background: #b2dfdb; color: #00695c; }

        .difficulty-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 10px;
        }

        .difficulty-trivial { background: #4caf50; color: white; }
        .difficulty-easy { background: #8bc34a; color: white; }
        .difficulty-medium { background: #ffc107; color: #333; }
        .difficulty-hard { background: #ff9800; color: white; }
        .difficulty-deadly { background: #f44336; color: white; }

        @media (max-width: 768px) {
            .encounters-header h1 { font-size: 1.8em; }
            .encounters-container { padding: 12px; }
            .encounter-panel { padding: 15px; }
            .encounters-grid { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="encounters-header">
        <h1>Gerador de Encontros Ravnica</h1>
        <p>Gere encontros temáticos para suas campanhas D&D 5e em Ravnica</p>
        <button class="back-btn" onclick="window.location.href='index.html'" title="Voltar aos Monstros">📖 Ver Criaturas</button>
    </div>

    <div class="encounters-container">
        <div class="encounter-panel">
            <h2>⚙️ Configuração do Encontro</h2>
            
            <div class="form-group">
                <label for="environment">🏙️ Ambiente</label>
                <select id="environment">
                    <option value="">-- Selecione um ambiente --</option>
                    <option value="azorius">🏛️ Distrito Administrativo Azorius</option>
                    <option value="orzhov">⛪ Catedral Orzhov</option>
                    <option value="izzet">🧪 Laboratório Izzet</option>
                    <option value="rakdos">🎭 Arena Rakdos</option>
                    <option value="selesnya">🌳 Jardim Selesnya</option>
                    <option value="golgari">☠️ Subterrâneos Golgari</option>
                    <option value="simic">🧬 Zonas Simic</option>
                    <option value="gruul">🪨 Território Gruul</option>
                    <option value="boros">Quartel Boros</option>
                    <option value="dimir">🕵️ Célula Dimir</option>
                    <option value="random">🎲 Aleatório</option>
                </select>
            </div>

            <div class="form-group">
                <label for="partySize">Número de Personagens</label>
                <input type="number" id="partySize" min="1" max="10" value="4" />
            </div>

            <div class="form-group">
                <label for="partyLevel">Nível do Grupo</label>
                <input type="number" id="partyLevel" min="1" max="20" value="1" />
            </div>

            <div class="form-group">
                <label for="difficulty">Dificuldade Desejada</label>
                <select id="difficulty">
                    <option value="random">🎲 Aleatória</option>
                    <option value="trivial">Trivial</option>
                    <option value="easy">Fácil</option>
                    <option value="medium">Média</option>
                    <option value="hard">Difícil</option>
                    <option value="deadly">Mortal</option>
                </select>
            </div>

            <div class="button-group">
                <button onclick="generateEncounter()">🎲 Gerar Encontro</button>
                <button class="secondary" onclick="openCreaturesTab()">📖 Ver Criaturas</button>
            </div>
        </div>

        <div class="encounter-result" id="encounterResult">
            <h3 id="encounterTitle">Encontro Gerado</h3>
            <div id="encounterContent"></div>
        </div>
    </div>

    <script src="encounters.js"></script>
</body>
</html>
